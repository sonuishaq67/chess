# Training hyperparameters

batch_size: 512
learning_rate: 1.0e-3
weight_decay: 0.1
max_epochs: 10
warmup_steps: 1500

# Logging & checkpointing
log_every: 100          # print loss every N steps
save_every: 2000        # save checkpoint every N steps
checkpoint_dir: checkpoints

# Data
bin_dir: dataset/bin
val_split: 0.05         # fraction of chunks held out for validation

# Mixed precision
use_amp: true

# Gradient clipping
grad_clip: 1.0
