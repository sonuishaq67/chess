# Training hyperparameters
# DDP: per-GPU batch × 8 GPUs × grad_accum = global effective batch
# 512 × 8 × 1 = 4096 tokens/step

batch_size: 512         # per-GPU; global = 512 × 8 GPUs = 4096
grad_accum_steps: 1     # no accumulation — lets ModuleCacher capture fwd+bwd+opt as one streamable graph
learning_rate: 6.0e-4
weight_decay: 0.1
max_epochs: 3
warmup_steps: 2000

# Logging & checkpointing
log_every: 50           # print loss every N steps
save_every: 2000        # save checkpoint every N steps
checkpoint_dir: checkpoints

# Data
# packing_dir is produced by `src/data/build_packing.py` (rebuild if max_seq_len changes)
packing_dir: dataset/packing
val_split: 0.05         # fraction of chunks held out for validation

# Mixed precision (BF16 on HPU — no loss scaling needed)
use_amp: true

# Gradient clipping
grad_clip: 1.0
