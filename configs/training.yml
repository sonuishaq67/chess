# Training hyperparameters

batch_size: 512
learning_rate: 6.0e-4
weight_decay: 0.1
max_epochs: 1
warmup_steps: 2000

# Logging & checkpointing
log_every: 50           # print loss every N steps
save_every: 2000        # save checkpoint every N steps
checkpoint_dir: checkpoints

# Data
bin_dir: dataset/bin
val_split: 0.05         # fraction of chunks held out for validation

# Mixed precision
use_amp: true

# Gradient clipping
grad_clip: 1.0
